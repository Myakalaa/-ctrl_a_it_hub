{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Login - CTRL A IT HUB{% endblock %}

{% block content %}
<div style="background:var(--bg-light);min-height:85vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;">
    <div class="card" style="width:100%;max-width:450px;padding:2.5rem;box-shadow:var(--shadow-hover);border-radius:12px;">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:3rem;color:var(--primary);margin-bottom:1rem;"><i class="fas fa-user-shield"></i></div>
            <h1 style="font-family:var(--font-main);font-size:1.8rem;color:var(--text-dark);margin-bottom:0.4rem;">Admin Login Portal</h1>
            <p style="color:var(--text-muted);font-size:0.88rem;line-height:1.6;">Manage courses, slideshow banners, check placements, and verify enquiries.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" style="font-weight:700;font-size:0.85rem;">Username</label>
                {{ form.username }}
            </div>
            
            <div class="form-group" style="margin-bottom:2rem;">
                <label class="form-label" style="font-weight:700;font-size:0.85rem;">Password</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%;border-radius:var(--radius);padding:.85rem;font-size:0.95rem;">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
